let player;
let currentSong = null;

let correct = 0;
let wrong = 0;

function normalize(text){
    return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\w\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
}

function updateScore(){
    document.getElementById("score").innerHTML =
        `Acerto: ${correct} | Incorreto: ${wrong}`;
}

function status(msg){
    document.getElementById("status").textContent = msg;
}

function onYouTubeIframeAPIReady(){

    player = new YT.Player("player",{
        width:"1",
        height:"1",
        playerVars:{
            autoplay:0
        },
        events:{
            onReady:()=>{
                status("Listo");
            },
            onError:(e)=>{
                console.log("YT Error", e.data);
                status("Error: " + e.data);
            }
        }
    });
}
    
let currentTimeout = null;

function playRandomClip(){

    document.getElementById("result").innerHTML = "";
    document.getElementById("guess").value = "";

    currentSong =
        videos[Math.floor(Math.random() * videos.length)];

    const start =
        Math.floor(Math.random() * 90);

    status("⌛ Cargando...");

    document.getElementById("player").innerHTML = `
        <iframe
            id="audioFrame"
            width="1"
            height="1"
            style="border:0;opacity:0;"
            allow="autoplay"
            src="https://www.youtube-nocookie.com/embed/${currentSong.id}?playlist=${currentSong.id}&autoplay=1&iv_load_policy=3&loop=1&start=${start}">
        </iframe>
    `;

    const frame = document.getElementById("audioFrame");

    frame.onload = () => {

        status("🎵 Escutando...");

        setTimeout(() => {

            document.getElementById("player").innerHTML = "";

            status("⏹ Final");

        }, 6000);

    };
}


function checkAnswer(){

    if(!currentSong) return;

    const user =
        normalize(
            document.getElementById("guess").value
        );

    const answer =
        normalize(currentSong.title);

    const words =
        answer.split(" ").filter(w => w.length >= 4);

    let ok = false;

    // Coincidencia exacta o parcial
    if(answer.includes(user) || user.includes(answer)){
        ok = true;
    }

    // Coincide con alguna palabra importante
    if(!ok){
        ok = words.some(word =>
            user.includes(word)
        );
    }

    if(ok){

        correct++;

        document.getElementById("result").innerHTML =
            "✅ Correto";

    }else{

        wrong++;

        document.getElementById("result").innerHTML =
            "❌ Incorreto<br><br>" +
            currentSong.title;
    }

    updateScore();
}

updateScore();
